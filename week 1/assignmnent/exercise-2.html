<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Hero</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- <a href="index.html">Click here to go to the main page</a> -->
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <h2>LauvStore</h2>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">

        <div class="hero-text">
            <h1>Question 1</h1>
            <h2>Smart Watch for Modern Life</h2>
            <p>
                Track your health, stay connected, and upgrade your lifestyle with our latest smartwatch.
            </p>
            <button>Buy Now</button>
        </div>

        <div class="hero-image">
            <img src="allyartist-music-1494213_1920.jpg" alt="Product Image">
        </div>

    </section>

    <h1>
        Question 2
    </h1>

    <section class="image-comparison">

        <div class="box">
            <h3>Cover</h3>
            <img src="allyartist-music-1494213_1920.jpg" alt="cover">
        </div>

        <div class="box">
            <h3>Contain</h3>
            <img src="allyartist-music-1494213_1920.jpg" alt="contain">
        </div>

        <div class="box">
            <h3>Fill</h3>
            <img src="allyartist-music-1494213_1920.jpg" alt="fill">
        </div>


    </section>

</body>

</html>
